services:
  postgres:
    image: postgres:15
    container_name: zlttbots-postgres
    environment:
      POSTGRES_USER: zlttbots
      POSTGRES_PASSWORD: zlttbots
      POSTGRES_DB: zlttbots
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: zlttbots-redis
    restart: always

  kafka:
    image: bitnami/kafka:latest
    container_name: zlttbots-kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    restart: always

  traefik:
    image: traefik:v3.0
    container_name: zlttbots-traefik
    command:
      - --providers.docker=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: zlttbots-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana
    container_name: zlttbots-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: always

  loki:
    image: grafana/loki
    container_name: zlttbots-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infrastructure/monitoring/loki.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: always

  ai-orchestrator:
    build: ./services/ai-orchestrator
    container_name: zlttbots-ai-orchestrator
    depends_on:
      - market-crawler
      - viral-predictor
      - redis
    networks:
      - zlttbots-net

  product-discovery:
    build: ./services/product-discovery
    container_name: zlttbots-product-discovery
    environment:
      MARKET_CRAWLER_URL: http://market-crawler:8000/products
      HTTP_TIMEOUT: 5
      HTTP_RETRIES: 3
      HTTP_BACKOFF: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - zlttbots-net

  campaign-optimizer:
    build: ./services/campaign-optimizer
    container_name: zlttbots-campaign-optimizer
    networks:
      - zlttbots-net

volumes:
  postgres-data:
  grafana-data:

networks:
  zlttbots-net:
    driver: bridge
