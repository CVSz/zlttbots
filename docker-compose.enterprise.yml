services:
  postgres:
    image: postgres:15
    container_name: zttato-postgres
    environment:
      POSTGRES_USER: zttato
      POSTGRES_PASSWORD: zttato
      POSTGRES_DB: zttato
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: zttato-redis
    restart: always

  kafka:
    image: bitnami/kafka:latest
    container_name: zttato-kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    restart: always

  traefik:
    image: traefik:v3.0
    container_name: zttato-traefik
    command:
      - --providers.docker=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: zttato-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana
    container_name: zttato-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: always

  loki:
    image: grafana/loki
    container_name: zttato-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infrastructure/monitoring/loki.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: always

volumes:
  postgres-data:
  grafana-data:

  ai-orchestrator:
    build: ./services/ai-orchestrator
    container_name: zttato-ai-orchestrator
    depends_on:
      - market-crawler
      - viral-predictor
      - redis
    networks:
      - zttato-net

  product-discovery:
    build: ./services/product-discovery
    container_name: zttato-product-discovery
    networks:
      - zttato-net

  campaign-optimizer:
    build: ./services/campaign-optimizer
    container_name: zttato-campaign-optimizer
    networks:
      - zttato-net
