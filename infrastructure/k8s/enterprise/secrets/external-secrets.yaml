apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zttato-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: zttato-secret-store
  target:
    name: zttato-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: zttato/platform
        property: DATABASE_URL
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: zttato/platform
        property: REDIS_PASSWORD
    - secretKey: STRIPE_KEY
      remoteRef:
        key: zttato/platform
        property: STRIPE_KEY
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: zttato/platform
        property: STRIPE_WEBHOOK_SECRET
    - secretKey: JWT_SECRET
      remoteRef:
        key: zttato/platform
        property: JWT_SECRET
