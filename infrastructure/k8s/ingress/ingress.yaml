apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zttato-ingress
spec:
  rules:
  - host: zttato.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 3000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: analytics
            port:
              number: 9000
