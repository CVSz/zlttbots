apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zlttbots-ingress
  namespace: platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/limit-rps: "25"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  rules:
    - host: zlttbots.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: analytics
                port:
                  number: 9000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: jwt-auth
                port:
                  number: 80
