apiVersion: apps/v1
kind: Deployment
metadata:
  name: click-tracker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: click-tracker
  template:
    metadata:
      labels:
        app: click-tracker
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: tracker
          image: zlttbots/click-tracker:v1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
