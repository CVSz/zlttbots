apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-renderer
  namespace: platform
  labels:
    app: gpu-renderer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-renderer
  template:
    metadata:
      labels:
        app: gpu-renderer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      securityContext:
        runAsNonRoot: true
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: gpu-renderer
          image: zlttbots/gpu-renderer:v1.0.0
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "500m"
              memory: 1Gi
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKER
              value: kafka.platform.svc.cluster.local:9092
            - name: JOB_TOPIC
              value: render-jobs
