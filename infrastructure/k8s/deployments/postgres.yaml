apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: zlttbots
            - name: POSTGRES_USER
              value: zlttbots
            - name: POSTGRES_PASSWORD
              value: zlttbots
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
