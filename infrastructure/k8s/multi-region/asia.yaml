apiVersion: v1
kind: Namespace
metadata:
  name: zlttbots-asia
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: zlttbots-asia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        region: asia
    spec:
      containers:
        - name: orchestrator
          image: zlttbots/orchestrator:latest
          env:
            - name: REGION
              value: asia
