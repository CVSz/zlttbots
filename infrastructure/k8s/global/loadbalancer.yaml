apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: global-lb
  namespace: platform
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.zlttbots.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jwt-auth
                port:
                  number: 80
