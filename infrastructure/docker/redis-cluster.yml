version: "3.9"
services:
  redis-node-1:
    image: redis:7
    command:
      - redis-server
      - --appendonly
      - yes
      - --cluster-enabled
      - yes
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - '5000'
      - --cluster-announce-port
      - '6379'
    ports:
      - '7001:6379'
  redis-node-2:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--cluster-announce-port", "6379"]
    ports:
