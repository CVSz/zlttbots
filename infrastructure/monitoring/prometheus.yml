global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: zttato-nginx
    static_configs:
      - targets: ["zttato-nginx:80"]

  - job_name: zttato-market-crawler
    metrics_path: /metrics
    static_configs:
      - targets: ["zttato-market-crawler:9400"]

  - job_name: zttato-viral-predictor
    metrics_path: /metrics
    static_configs:
      - targets: ["zttato-viral-predictor:9100"]

  - job_name: zttato-arbitrage-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["zttato-arbitrage-engine:9500"]

  - job_name: zttato-gpu-renderer
    metrics_path: /metrics
    static_configs:
      - targets: ["zttato-gpu-renderer:9300"]
