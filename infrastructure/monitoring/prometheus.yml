global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: zlttbots-nginx
    static_configs:
      - targets: ["zlttbots-nginx:80"]

  - job_name: zlttbots-market-crawler
    metrics_path: /metrics
    static_configs:
      - targets: ["zlttbots-market-crawler:9400"]

  - job_name: zlttbots-viral-predictor
    metrics_path: /metrics
    static_configs:
      - targets: ["zlttbots-viral-predictor:9100"]

  - job_name: zlttbots-arbitrage-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["zlttbots-arbitrage-engine:9500"]

  - job_name: zlttbots-gpu-renderer
    metrics_path: /metrics
    static_configs:
      - targets: ["zlttbots-gpu-renderer:9300"]

  - job_name: zlttbots-model-service
    metrics_path: /metrics
    static_configs:
      - targets: ["zlttbots-model-service:8000"]

  - job_name: zlttbots-analytics
    metrics_path: /metrics
    static_configs:
      - targets: ["zlttbots-analytics:3000"]
