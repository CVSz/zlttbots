apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-arbitrage-engine
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: zlttbots
    app.kubernetes.io/component: arbitrage-engine
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zlttbots
      app.kubernetes.io/component: arbitrage-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zlttbots
        app.kubernetes.io/component: arbitrage-engine
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      containers:
        - name: arbitrage-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: zlttbots-secrets
                  key: DB_URL
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: {{ .Values.health.livenessPath }}
              port: {{ .Values.health.port }}
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.health.readinessPath }}
              port: {{ .Values.health.port }}
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: {{ .Values.health.startupPath }}
              port: {{ .Values.health.port }}
            failureThreshold: {{ .Values.health.startupFailureThreshold }}
            periodSeconds: {{ .Values.health.startupPeriodSeconds }}
