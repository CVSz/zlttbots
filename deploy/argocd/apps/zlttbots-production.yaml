apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zlttbots-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cvsz/zlttbots.git
    targetRevision: main
    path: deploy/helm/zlttbots
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: image.tag
          value: "2026.04.08"
  destination:
    server: https://kubernetes.default.svc
    namespace: zlttbots
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
