name: Enterprise Platform Delivery

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - 'services/jwt-auth/**'
      - '.github/workflows/enterprise-platform-delivery.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install checks
        run: |
          python -m pip install --upgrade pip
          pip install pytest yamllint fastapi httpx requests redis psycopg2-binary prometheus-client

      - name: Unit tests
        run: pytest -q

      - name: Lint Kubernetes manifests
        run: yamllint infrastructure/k8s

  container-build:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build jwt-auth image
        run: docker build -t zttato/jwt-auth:${{ github.sha }} services/jwt-auth

  deploy-staging:
    needs: [container-build]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4
      - name: Kustomize deploy
        run: kubectl apply -k infrastructure/k8s
