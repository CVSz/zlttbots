name: zlttbots-enterprise-build

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker Images
        run: |
          docker build -t zlttbots-market-crawler services/market-crawler
          docker build -t zlttbots-viral-predictor services/viral-predictor
          docker build -t zlttbots-arbitrage-engine services/arbitrage-engine
