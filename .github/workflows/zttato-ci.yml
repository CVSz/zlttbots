name: zTTato CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: zttato

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest bandit fastapi httpx requests redis psycopg2-binary prometheus-client

      - name: Repository validation
        run: bash infrastructure/scripts/validate-repo.sh

      - name: API contract compatibility checks
        run: bash infrastructure/scripts/check-api-contracts.sh

      - name: IaC policy checks
        run: bash infrastructure/scripts/check-iac-policy.sh

      - name: Feature/drift manifest validation
        run: |
          python scripts/feature_impact_dive.py --write-manifest
          git diff --exit-code config/service-surface-manifest.json
          python scripts/feature_impact_dive.py --validate-manifest

      - name: Documentation snippet and command-style validation
        run: python scripts/validate_docs_snippets.py

      - name: Python unit tests (warnings treated as errors)
        run: pytest -q -W error

      - name: SAST (Python)
        run: bandit -r enterprise_maturity services -x services/admin-panel

      - name: Dependency vulnerability scan (Node)
        run: bash infrastructure/scripts/node-dependency-scan.sh

  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy file system scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '1'

  build-images:
    runs-on: ubuntu-latest
    needs:
      - lint-and-validate
      - security-scans
    strategy:
      fail-fast: false
      matrix:
        service:
          - analytics
          - click-tracker
          - tiktok-uploader
          - ai-video-generator
          - shopee-crawler
          - account-farm
          - admin-panel
          - arbitrage-engine
          - gpu-renderer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  dast-scan:
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start local stack
        run: docker compose up -d

      - name: Run ZAP baseline scan
        run: |
          docker run --network host --rm ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:3000 -m 2 -I

      - name: Stop local stack
        if: always()
        run: docker compose down


  promote-dev:
    if: github.ref == 'refs/heads/main'
    needs: [build-images, dast-scan]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Simulate dev deployment promotion
        run: echo "Promoted $GITHUB_SHA to dev"

  promote-staging:
    if: github.ref == 'refs/heads/main'
    needs: [promote-dev]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Simulate staging deployment promotion
        run: echo "Promoted $GITHUB_SHA to staging"

  promote-production:
    if: github.ref == 'refs/heads/main'
    needs: [promote-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to production
        run: kubectl apply -f infrastructure/k8s
