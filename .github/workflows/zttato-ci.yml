name: zTTato CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: zttato

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Repository validation
        run: bash infrastructure/scripts/validate-repo.sh

      - name: API contract compatibility checks
        run: bash infrastructure/scripts/check-api-contracts.sh

      - name: IaC policy checks
        run: bash infrastructure/scripts/check-iac-policy.sh

      - name: Python unit tests
        run: pytest -q

  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy file system scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '1'

  build-images:
    runs-on: ubuntu-latest
    needs:
      - lint-and-validate
      - security-scans
    strategy:
      fail-fast: false
      matrix:
        service:
          - analytics
          - click-tracker
          - tiktok-uploader
          - ai-video-generator
          - shopee-crawler
          - account-farm
          - admin-panel
          - arbitrage-engine
          - gpu-renderer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t $REGISTRY/$IMAGE_PREFIX/${{ matrix.service }}:${{ github.sha }} services/${{ matrix.service }}

  promote-dev:
    if: github.ref == 'refs/heads/main'
    needs: [build-images]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Simulate dev deployment promotion
        run: echo "Promoted $GITHUB_SHA to dev"

  promote-staging:
    if: github.ref == 'refs/heads/main'
    needs: [promote-dev]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Simulate staging deployment promotion
        run: echo "Promoted $GITHUB_SHA to staging"

  promote-production:
    if: github.ref == 'refs/heads/main'
    needs: [promote-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to production
        run: kubectl apply -f infrastructure/k8s
